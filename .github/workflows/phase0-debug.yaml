name: Phase 0 Debug Loop

# ------------------------------------------------------------------
# Purpose:
#   Run Phase 0 diagnostic (no SLURM dependency) on a GitHub runner so
#   that Claude can iterate diagnosis -> fix -> re-run inside this PR
#   without round-tripping through Shiva. Results are committed back
#   to the branch under outputs/ci/ so Claude can read them in the
#   next turn.
#
# Architecture note:
#   This workflow uses the standard r-lib/actions/setup-r-dependencies@v2
#   pattern, matching every other R workflow in this repo (R-CMD-check,
#   test-coverage, pkgdown, etc.). That action handles DESCRIPTION
#   parsing, Remotes: field resolution, system dependencies, caching,
#   and (critically) GitHub authentication correctly. Earlier versions
#   of this workflow tried to call remotes::install_deps() directly
#   and hit 401 errors that turned out to be due to token plumbing
#   that setup-r-dependencies handles transparently.
#
# Trigger:
#   Manual only (workflow_dispatch). Use either the "Run workflow"
#   button in the Actions tab, or:
#     gh workflow run phase0-debug.yaml \
#        --ref <branch-name> -f n=5
#
# Outputs (committed to the triggered branch):
#   outputs/ci/phase0_n<N>_run<RUNID>/
#     SUMMARY.txt            (structured diagnostics for Claude)
#     one_fit_n<N>_ci.rds    (full fit bundle)
#     one_fit_n<N>_ci_diag.rds
#     run.log                (full Rscript stdout/stderr)
#     ERROR.txt              (only if the fit failed)
# ------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      n:
        description: "Number of subjects (5 for fast iteration, 48 for full cohort)"
        required: true
        default: "5"
        type: choice
        options: ["5", "48"]
      iter_warmup:
        description: "Warmup iterations per chain"
        required: false
        default: "500"
      iter_sampling:
        description: "Sampling iterations per chain"
        required: false
        default: "500"
      chains:
        description: "Number of MCMC chains"
        required: false
        default: "2"

permissions:
  contents: write

concurrency:
  group: phase0-debug-${{ github.ref }}
  cancel-in-progress: false

jobs:
  phase0:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      # Matches every other R workflow in this repo. Required for setup-r-dependencies
      # to authenticate package downloads from GitHub (including UCD-SERG/serodynamics
      # via the Remotes: field in DESCRIPTION).
      GITHUB_PAT:       ${{ secrets.GITHUB_TOKEN }}
      N_SUBJECTS:       ${{ inputs.n }}
      ITER_WARMUP:      ${{ inputs.iter_warmup }}
      ITER_SAMPLING:    ${{ inputs.iter_sampling }}
      CHAINS:           ${{ inputs.chains }}
      CMDSTAN_VERSION:  "2.38.0"

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install package dependencies
        # This step handles:
        #   - DESCRIPTION Imports / Depends / LinkingTo / Suggests
        #   - Remotes: field (stan-dev/cmdstanr, UCD-SERG/serodynamics)
        #   - System libraries (apt-get install)
        #   - Caching (transparent)
        # The same action and same auth setup are used by R-CMD-check.yaml.
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::posterior
            stan-dev/cmdstanr
          needs: check

      - name: Cache cmdstan
        id: cache-cmdstan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-${{ env.CMDSTAN_VERSION }}
          restore-keys: |
            cmdstan-${{ runner.os }}-

      - name: Install cmdstan (only if cache miss)
        if: steps.cache-cmdstan.outputs.cache-hit != 'true'
        run: |
          cmdstanr::check_cmdstan_toolchain(fix = TRUE)
          cmdstanr::install_cmdstan(
            version = Sys.getenv("CMDSTAN_VERSION"),
            cores = 2
          )
        shell: Rscript {0}

      - name: Register cmdstan path
        run: |
          paths <- list.files("~/.cmdstan", pattern = "^cmdstan-",
                              full.names = TRUE)
          stopifnot(length(paths) >= 1)
          cmdstanr::set_cmdstan_path(paths[1])
          cat("cmdstan at:", cmdstanr::cmdstan_path(), "\n")
          cat("cmdstan version:", cmdstanr::cmdstan_version(), "\n")
        shell: Rscript {0}

      - name: Install local shigella package
        # Use R CMD INSTALL (base R, shell-level) instead of devtools::install
        # or remotes::install_local. setup-r-dependencies@v2 doesn't guarantee
        # remotes/devtools remain in the user library after it finishes, and
        # devtools::install's `upgrade` arg expectations vary by version.
        # R CMD INSTALL has no such dependencies — it's the lowest-level
        # installer and always works.
        run: R CMD INSTALL --no-multiarch --with-keep.source .

      - name: Run Phase 0 diagnostic
        id: run
        run: |
          set +e   # don't abort if Rscript exits non-zero — we capture errors ourselves
          mkdir -p outputs/ci
          OUT_DIR="outputs/ci/phase0_n${N_SUBJECTS}_run${GITHUB_RUN_ID}"
          echo "out_dir=${OUT_DIR}" >> "$GITHUB_OUTPUT"
          mkdir -p "${OUT_DIR}"

          Rscript -e '
            `%||%` <- function(a, b) if (is.null(a)) b else a

            out_dir <- Sys.getenv("OUT_DIR")
            n           <- as.integer(Sys.getenv("N_SUBJECTS"))
            iter_warmup <- as.integer(Sys.getenv("ITER_WARMUP"))
            iter_samp   <- as.integer(Sys.getenv("ITER_SAMPLING"))
            chains      <- as.integer(Sys.getenv("CHAINS"))

            suppressPackageStartupMessages(library(shigella))

            res <- tryCatch({
              shigella:::run_phase0_diagnostic(
                n             = n,
                iter_warmup   = iter_warmup,
                iter_sampling = iter_samp,
                tag           = sprintf("n%d_ci", n),
                output_dir    = out_dir,
                chains        = chains
              )
            }, error = function(e) {
              writeLines(
                c("STATUS: FIT_FAILED",
                  paste("ERROR:", conditionMessage(e))),
                file.path(out_dir, "ERROR.txt"))
              NULL
            })

            summary_path <- file.path(out_dir, "SUMMARY.txt")
            lines <- c(
              sprintf("RUN_ID: %s",      Sys.getenv("GITHUB_RUN_ID")),
              sprintf("N: %d",           n),
              sprintf("ITER_WARMUP: %d", iter_warmup),
              sprintf("ITER_SAMPLING: %d", iter_samp),
              sprintf("CHAINS: %d",      chains)
            )

            if (is.null(res)) {
              lines <- c(lines, "STATUS: FAILED",
                         "See ERROR.txt for the R-side error message.")
            } else {
              s <- res$omega_B_summary
              d <- res$diagnostic_summary
              total_iters <- iter_samp * chains
              lines <- c(lines,
                "STATUS: OK",
                sprintf("ELAPSED_MIN: %.2f",        res$elapsed_min  %||% NA_real_),
                sprintf("TRUE_RHO_B: %+.3f",        res$true_rho_B   %||% NA_real_),
                sprintf("POST_MEDIAN_RHO_B: %+.3f", s$median         %||% NA_real_),
                sprintf("POST_LO_2.5: %+.3f",      s[["2.5%"]]      %||% NA_real_),
                sprintf("POST_HI_97.5: %+.3f",     s[["97.5%"]]     %||% NA_real_),
                sprintf("ESS_BULK: %.0f",           s$ess_bulk       %||% NA_real_),
                sprintf("RHAT: %.3f",               s$rhat           %||% NA_real_),
                sprintf("DIVERGENT: %d / %d",       sum(d$num_divergent %||% 0L),    total_iters),
                sprintf("TREEDEPTH: %d / %d",       sum(d$num_max_treedepth %||% 0L), total_iters)
              )

              ess  <- s$ess_bulk %||% 0
              rhat <- s$rhat %||% Inf
              divg <- sum(d$num_divergent %||% 0L) / total_iters
              ttdp <- sum(d$num_max_treedepth %||% 0L) / total_iters
              verdict <- if (ess > 400 && rhat < 1.01 && divg < 0.05 && ttdp < 0.10) {
                "HEALTHY"
              } else if (ess > 100 && rhat < 1.10 && divg < 0.10 && ttdp < 0.30) {
                "DEGRADED"
              } else {
                "PATHOLOGICAL"
              }
              lines <- c(lines, sprintf("VERDICT: %s", verdict))
            }

            writeLines(lines, summary_path)
            cat("=== SUMMARY.txt ===\n")
            cat(readLines(summary_path), sep = "\n")
            cat("\n=== End SUMMARY.txt ===\n")
          ' 2>&1 | tee "${OUT_DIR}/run.log"

          exit 0
        env:
          OUT_DIR: outputs/ci/phase0_n${{ inputs.n }}_run${{ github.run_id }}
          
      - name: Run bimodality diagnostic
        # Runs after the fit so the new RDS is available. Reads its own
        # OUT_DIR from the positional argument we pass. Skips with a
        # warning (not a fail) if the script or RDS is missing.
        if: always()
        env:
          OUT_DIR: outputs/ci/phase0_n${{ inputs.n }}_run${{ github.run_id }}
        run: |
          set +e
          if [ ! -f scripts/diagnostic_bimodality.R ]; then
            echo "diagnostic_bimodality.R missing; skipping."
            exit 0
          fi
          if [ ! -f "${OUT_DIR}/one_fit_n${N_SUBJECTS}_ci.rds" ]; then
            echo "Fit RDS missing at ${OUT_DIR}; skipping diagnostic."
            exit 0
          fi
          echo "Running diagnostic_bimodality.R on ${OUT_DIR}..."
          Rscript scripts/diagnostic_bimodality.R "${OUT_DIR}" 2>&1 \
            | tee "${OUT_DIR}/diagnostic_bimodality.log"
          exit 0

      - name: Commit outputs back to the branch
        if: always()
        run: |
          set -euo pipefail
          if [ ! -d outputs/ci ] || [ -z "$(ls -A outputs/ci 2>/dev/null)" ]; then
            echo "outputs/ci/ is empty or missing; nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ci/
          if git diff --cached --quiet; then
            echo "No new outputs to commit."
            exit 0
          fi
          git commit -m "ci(phase0): n=${N_SUBJECTS} run ${GITHUB_RUN_ID} [skip ci]"
          BRANCH="${GITHUB_REF#refs/heads/}"
          git push origin "HEAD:${BRANCH}"

      - name: Upload artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-n${{ inputs.n }}-run${{ github.run_id }}
          path: outputs/ci/
          retention-days: 14
